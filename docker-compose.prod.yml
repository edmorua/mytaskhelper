version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-mytaskhelper}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE}
    restart: always
    env_file: /opt/mytaskhelper/.env.backend
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: always
    env_file: /opt/mytaskhelper/.env.frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
