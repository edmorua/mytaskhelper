version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mytaskhelper_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mytaskhelper
      POSTGRES_USER: ${DB_USER:-taskuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskpassword}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-taskuser} -d mytaskhelper']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mytaskhelper_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: development
    container_name: mytaskhelper_backend
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env
    ports:
      - '3001:3001'
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run start:dev

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: development
    container_name: mytaskhelper_frontend
    restart: unless-stopped
    env_file:
      - ./apps/frontend/.env.local
    ports:
      - '3000:3000'
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
